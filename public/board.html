<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board – QRmeet</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@2.0.4/dist/qrcode.js" integrity="sha384-e9EFD6BGC90bkW9aDV5xbbBfzwN7G8YImHao2lfLVKV/hPB0E0go+H3I64h7oHtA" crossorigin="anonymous"></script>
  <script type="module" src="/board.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh" crossorigin="anonymous"></script>
</head>
<body>
  <div x-data="boardApp" x-cloak>
    <div class="board-wrap">
      <div class="board-header">
        <div class="board-header__row">
          <img class="board-header__logo" src="/icon.svg" alt="QRMeet logo">
          <div class="board-header__text">
            <h1>Leaderboard</h1>
            <p class="board-header__sub" x-text="roomName || roomId"></p>
          </div>
        </div>
        <p class="board-header__expiry" x-show="countdown" x-text="countdown"></p>
      </div>

      <!-- Left column on wide screens: stats + tab navigation -->
      <div class="board-side">
        <!-- Stat Cards -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-card__value" x-text="totalParticipants"></div>
            <div class="stat-card__label">Participants</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" x-text="totalMeetings"></div>
            <div class="stat-card__label">Meetings</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" x-text="topScore"></div>
            <div class="stat-card__label">Top Score</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tabs__btn" :class="{ 'tabs__btn--active': tab === 'top10' }" @click="tab = 'top10'" x-text="'Top ' + boardTopSize"></button>
          <button class="tabs__btn" :class="{ 'tabs__btn--active': tab === 'graph' }" @click="tab = 'graph'; loadGraph()">Graph</button>
          <button class="tabs__btn" :class="{ 'tabs__btn--active': tab === 'join' }" @click="tab = 'join'">Join</button>
        </div>
      </div>

      <!-- Right column on wide screens: active tab content -->
      <div class="board-main">

      <!-- Leaderboard (top N) Tab -->
      <div x-show="tab === 'top10'">

        <!-- Podium: top 3 -->
        <div class="podium" x-show="topThree.length > 0">
          <template x-for="(user, i) in topThree" :key="user.public_id">
            <div class="podium__place" :class="'podium__place--rank' + (i + 1)">
              <div class="podium__avatar" x-text="user.emoji"></div>
              <div class="podium__name" x-text="user.display_name"></div>
              <div class="podium__meta" x-show="hasTreasures">
                <span x-text="'👥 ' + user.meetings"></span>
                <span x-text="'🏆 ' + user.treasures"></span>
              </div>
              <div class="podium__pedestal">
                <span class="podium__medal" x-text="['🥇','🥈','🥉'][i]"></span>
                <span class="podium__score" x-text="user.score"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- Remaining ranks: 4th and below, with relative score bars -->
        <div class="rank-list" x-show="rest.length > 0">
          <!-- Legend: explains the stat columns (only when the treasure hunt is in play) -->
          <div class="rank-legend" x-show="hasTreasures">
            <span class="rank-legend__col" title="Meetings (confirmed conversations)">👥</span>
            <span class="rank-legend__col" title="Treasures found">🏆</span>
            <span class="rank-legend__col rank-legend__col--total">Total</span>
          </div>
          <template x-for="(user, i) in rest" :key="user.public_id">
            <div class="rank-row">
              <span class="rank-row__num" x-text="i + 4"></span>
              <span class="rank-row__emoji" x-text="user.emoji"></span>
              <div class="rank-row__body">
                <span class="rank-row__name" x-text="user.display_name"></span>
                <div class="rank-row__bar">
                  <div class="rank-row__bar-fill" :style="'width:' + barWidth(user.score) + '%'"></div>
                </div>
              </div>
              <div class="rank-row__stats">
                <span class="rank-row__col" x-show="hasTreasures" x-text="user.meetings"></span>
                <span class="rank-row__col" x-show="hasTreasures" x-text="user.treasures"></span>
                <span class="rank-row__col rank-row__col--total" x-text="user.score"></span>
              </div>
            </div>
          </template>
        </div>

        <p class="leaderboard__empty" x-show="scores.length === 0">No participants yet.</p>
        <p class="leaderboard__note" x-show="totalParticipants > scores.length" x-text="'Showing top ' + scores.length + ' of ' + totalParticipants + ' participants'"></p>
      </div>

      <!-- Graph Tab -->
      <div class="tab-graph" x-show="tab === 'graph'">
        <div class="graph" id="board-graph"></div>
      </div>

      <!-- Join Tab -->
      <div x-show="tab === 'join'">
        <div class="join-tab">
          <div class="qr-box" id="room-qr"></div>
          <button class="copy-url-btn" @click="copyUrl()">
            <span x-text="copied ? '✓ Copied!' : '📋 Copy Room URL'"></span>
          </button>
          <span class="join-tab__feedback" x-show="copied" x-transition>✓ Copied!</span>
        </div>
      </div>

      </div><!-- /.board-main -->
    </div>
  </div>

</body>
</html>
