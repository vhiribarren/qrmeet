<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="#ffffff">
    <!-- top-left QR corner -->
    <rect x="80"  y="80"  width="96" height="96" rx="20"/>
    <rect x="108" y="108" width="40" height="40" rx="8" fill="#6366f1"/>
    <!-- top-right QR corner -->
    <rect x="336" y="80"  width="96" height="96" rx="20"/>
    <rect x="364" y="108" width="40" height="40" rx="8" fill="#6366f1"/>
    <!-- bottom-left QR corner -->
    <rect x="80"  y="336" width="96" height="96" rx="20"/>
    <rect x="108" y="364" width="40" height="40" rx="8" fill="#6366f1"/>
    <!-- center handshake emoji -->
    <text x="256" y="312" font-size="180" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🤝</text>
  </g>
</svg>
