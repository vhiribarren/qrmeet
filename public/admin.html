<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My rooms – QRmeet</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script type="module" src="/admin.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh" crossorigin="anonymous"></script>
</head>
<body>
  <div x-data="adminHome" x-cloak>
    <div class="admin-wrap">
      <div class="admin-header">
        <a href="/" class="btn btn--ghost admin-header__back">← Back to game</a>
        <h1>🛠 My rooms</h1>
        <p class="admin-header__sub">Rooms you administer on this device</p>
      </div>

      <!-- Room list -->
      <div x-show="mode === 'list'">
        <template x-if="rooms.length === 0">
          <p class="auth-gate__hint" style="text-align:center; margin: 24px 0;">
            No rooms yet. Create one, or add an existing room with its password.
          </p>
        </template>

        <ul class="room-list">
          <template x-for="room in rooms" :key="room.id">
            <li class="room-list__item">
              <button class="room-list__open" @click="open(room.id)">
                <span class="room-list__name" x-text="room.name || room.id"></span>
                <span class="room-list__code" x-text="'Code: ' + room.id"></span>
              </button>
              <button class="room-list__forget" @click="forget(room.id, room.name)" title="Remove from this device">✕</button>
            </li>
          </template>
        </ul>

        <div class="room-actions">
          <button class="btn btn--primary" @click="mode = 'create'; error = ''">➕ Create a room</button>
          <button class="btn btn--secondary" @click="mode = 'add'; error = ''">🔑 Add an existing room</button>
        </div>
      </div>

      <!-- Add existing room -->
      <div x-show="mode === 'add'" class="auth-gate">
        <h2>🔑 Add an existing room</h2>
        <p class="auth-gate__hint">Enter the room code and the admin password you set for it.</p>
        <form @submit.prevent="addExisting()">
          <input type="text" x-model="addCode" placeholder="Room code (e.g. abc123)" maxlength="6"
            autocapitalize="none" autocomplete="off">
          <input type="password" x-model="addPassword" placeholder="Admin password" autocomplete="current-password">
          <button type="submit" class="btn btn--primary" :disabled="busy || !addCode || !addPassword"
            x-text="busy ? 'Checking…' : 'Add room'"></button>
          <p class="auth-gate__error" x-show="error" x-text="error"></p>
        </form>
        <button class="btn btn--ghost" @click="mode = 'list'; error = ''">Cancel</button>
      </div>

      <!-- Create room -->
      <div x-show="mode === 'create'" class="auth-gate">
        <h2>➕ Create a room</h2>
        <form @submit.prevent="createRoom()">
          <input type="text" x-model="createName" placeholder="Room name (e.g. Team Building 2026)" maxlength="40" autocomplete="off">
          <input type="password" x-model="createPassword" placeholder="Admin password (min 4 characters)" minlength="4" autocomplete="new-password">
          <button type="submit" class="btn btn--primary" :disabled="busy || createPassword.length < 4"
            x-text="busy ? 'Creating…' : 'Create'"></button>
          <p class="auth-gate__error" x-show="error" x-text="error"></p>
        </form>
        <button class="btn btn--ghost" @click="mode = 'list'; error = ''">Cancel</button>
      </div>

      <div class="toast" x-show="toast" x-transition x-text="toast"></div>
    </div>
  </div>
</body>
</html>
